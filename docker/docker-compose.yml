version: '3.8'

networks:
  collab-net:
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    container_name: collab-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: collab_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collab-net

  redis:
    image: redis:7-alpine
    container_name: collab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collab-net

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: collab-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: 123456
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - collab-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: collab-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collab-net

  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    container_name: collab-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"     # API
      - "9001:9001"     # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASS: minioadmin123
      MINIO_SERVER_URL: "http://localhost:9000"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collab-net

  message-service-1:
    build: ../message-service
    ports:
      - "8082:8082"
    environment:
      - SNOWFLAKE_WORKER_ID=1
      - SERVER_ID=msg-1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - collab-net

  message-service-2:
    build: ../message-service
    ports:
      - "8083:8082"
    environment:
      - SNOWFLAKE_WORKER_ID=2
      - SERVER_ID=msg-2
      - SERVER_PORT=8083
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - collab-net

  notification-service:
    build: ../notification-service
    ports:
      - "8084:8084"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - collab-net

  file-service:
    build: ../file-service
    ports:
      - "8085:8085"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - collab-net

volumes:
  mysql-data:
  minio-data:
